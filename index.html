<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTA Predictor — Destino Clínico</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ──────────────────────────────────────────────── */
    :root {
      --bg:          #0a0f1a;
      --surface:     #111827;
      --surface-2:   #1a2235;
      --border:      #1e3050;
      --border-hi:   #2d4a7a;
      --text:        #e2e8f0;
      --text-muted:  #64748b;
      --text-dim:    #94a3b8;
      --accent:      #38bdf8;
      --accent-glow: rgba(56,189,248,.15);
      --green:       #22c55e;
      --orange:      #f59e0b;
      --red:         #ef4444;
      --red-glow:    rgba(239,68,68,.15);
      --mono:        'IBM Plex Mono', monospace;
      --sans:        'IBM Plex Sans', sans-serif;
      --radius:      6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
    }
    .header-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .12em;
      color: var(--accent);
      background: var(--accent-glow);
      border: 1px solid var(--accent);
      border-radius: 3px;
      padding: 3px 8px;
      text-transform: uppercase;
    }
    header h1 {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: .01em;
    }
    header p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 0;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 720px) {
      .container { grid-template-columns: 1fr; }
    }

    /* ── Cards ──────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-header .eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .card-header h2 {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
    }
    .card-body { padding: 20px; }

    /* ── Form ───────────────────────────────────────────────── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .span-2 { grid-column: span 2; }

    .field { display: flex; flex-direction: column; gap: 5px; }
    label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    input[type="number"],
    input[type="date"],
    select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 9px 12px;
      width: 100%;
      transition: border-color .15s;
      appearance: none;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    select option { background: #111827; }

    /* Checkboxes grid */
    .flags-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }
    .flag-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .flag-item:has(input:checked) {
      background: rgba(56,189,248,.08);
      border-color: var(--accent);
    }
    .flag-item input { display: none; }
    .flag-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 1px solid var(--text-muted);
      flex-shrink: 0;
      transition: background .15s, border-color .15s;
    }
    .flag-item:has(input:checked) .flag-dot {
      background: var(--accent);
      border-color: var(--accent);
    }
    .flag-label { font-size: 12px; color: var(--text-dim); }

    /* Divider */
    .section-divider {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 16px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }

    /* Submit */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0a0f1a;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .06em;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      margin-top: 20px;
      text-transform: uppercase;
    }
    .btn-submit:hover { opacity: .88; }
    .btn-submit:active { transform: scale(.99); }
    .btn-submit:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Resultado panel ────────────────────────────────────── */
    .result-panel { position: sticky; top: 24px; }

    .result-empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .result-empty .icon { font-size: 32px; margin-bottom: 10px; opacity: .4; }

    /* Destino badge */
    .destino-badge {
      border-radius: 4px;
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
    }
    .destino-badge.red    { background: var(--red-glow);    border: 1px solid var(--red); }
    .destino-badge.orange { background: rgba(245,158,11,.1); border: 1px solid var(--orange); }
    .destino-badge.green  { background: rgba(34,197,94,.1);  border: 1px solid var(--green); }

    .destino-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .destino-valor {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: .02em;
    }
    .destino-badge.red    .destino-valor { color: var(--red); }
    .destino-badge.orange .destino-valor { color: var(--orange); }
    .destino-badge.green  .destino-valor { color: var(--green); }

    .confianza {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Barras de probabilidad */
    .prob-list { display: flex; flex-direction: column; gap: 10px; }
    .prob-item label {
      display: flex;
      justify-content: space-between;
      text-transform: none;
      letter-spacing: 0;
      margin-bottom: 4px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .prob-item label span {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
    }
    .prob-bar-bg {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .prob-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .5s ease;
    }

    /* Features calculadas */
    .kv-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .kv-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
    }
    .kv-key {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .kv-val {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--accent);
      font-weight: 600;
      margin-top: 2px;
    }

    /* Spinner */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-box {
      background: var(--red-glow);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 13px;
      color: #fca5a5;
    }

    /* Config bar */
    .config-bar {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .config-bar label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
    .config-bar input[type="text"] {
      flex: 1;
      min-width: 180px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 10px;
      border-radius: var(--radius);
    }
    .config-bar input:focus { outline: none; border-color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div>
    <div class="header-badge">Prototipo académico</div>
  </div>
  <div>
    <h1>HTA Predictor — Destino Clínico</h1>
    <p>Clasificación de riesgo para pacientes hipertensos · Modelo XGBoost · ESSALUD</p>
  </div>
</header>

<div class="container">

  <!-- ── Formulario ── -->
  <div>

    <!-- Config API -->
    <div class="config-bar">
      <label>URL del backend</label>
      <input type="text" id="apiUrl"
             value="https://hta-predictor-api.onrender.com"
             placeholder="https://hta-predictor-api.onrender.com" />
    </div>

    <form id="htaForm">

      <!-- Datos generales -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-header">
          <span class="eyebrow">01</span>
          <h2>Datos del encuentro</h2>
        </div>
        <div class="card-body">
          <div class="grid-2">
            <div class="field">
              <label>Fecha de atención</label>
              <input type="date" name="fecha_atencion" id="fecha_atencion" />
            </div>
            <div class="field">
              <label>Tipo de personal</label>
              <select name="tipo_personal_salud">
                <option value="MEDICO">Médico</option>
                <option value="ENFERMERO(A)">Enfermero(a)</option>
              </select>
            </div>
            <div class="field">
              <label>Nivel de establecimiento</label>
              <select name="nivel_eess">
                <option value="2">Nivel II</option>
                <option value="3">Nivel III</option>
                <option value="4">Nivel IV</option>
              </select>
            </div>
            <div class="field">
              <label>Sexo</label>
              <select name="sexo">
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Datos clínicos -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-header">
          <span class="eyebrow">02</span>
          <h2>Datos clínicos</h2>
        </div>
        <div class="card-body">
          <div class="grid-3">
            <div class="field">
              <label>Edad (años)</label>
              <input type="number" name="edad" min="0" max="120" placeholder="55" required />
            </div>
            <div class="field">
              <label>PA Sistólica (mmHg)</label>
              <input type="number" name="pas" min="60" max="300" placeholder="160" required />
            </div>
            <div class="field">
              <label>PA Diastólica (mmHg)</label>
              <input type="number" name="pad" min="30" max="200" placeholder="95" required />
            </div>
          </div>

          <div style="margin-top:14px;" class="grid-2">
            <div class="field">
              <label>Estadio HTA</label>
              <select name="estadio_hta">
                <option value="Normal">Normal</option>
                <option value="Elevada">Elevada</option>
                <option value="HTA_1" selected>HTA 1</option>
                <option value="HTA_2">HTA 2</option>
                <option value="Crisis_HTA">Crisis Hipertensiva</option>
                <option value="Desconocido">Desconocido</option>
              </select>
            </div>
            <div class="field">
              <label>N° diagnósticos totales</label>
              <input type="number" name="n_diagnosticos" min="0" placeholder="3" required />
            </div>
            <div class="field">
              <label>Diagnósticos definitivos</label>
              <input type="number" name="n_diag_definitivos" min="0" placeholder="2" value="0" />
            </div>
            <div class="field">
              <label>N° comorbilidades</label>
              <input type="number" name="n_comorbilidades" min="0" placeholder="1" value="0" />
            </div>
          </div>

          <!-- Hospitalización -->
          <div class="section-divider">Hospitalización</div>
          <div class="grid-2">
            <div class="field">
              <label>¿Hospitalizado?</label>
              <select name="flag_hospitalizado" id="flagHosp">
                <option value="0">No</option>
                <option value="1">Sí</option>
              </select>
            </div>
            <div class="field" id="diasHospField">
              <label>Días hospitalizado</label>
              <input type="number" name="dias_hosp" min="0" placeholder="0" value="0" />
            </div>
          </div>
        </div>
      </div>

      <!-- Comorbilidades -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-header">
          <span class="eyebrow">03</span>
          <h2>Comorbilidades</h2>
        </div>
        <div class="card-body">
          <div class="flags-grid">
            <label class="flag-item">
              <input type="checkbox" name="flag_dm2"       value="1" /><span class="flag-dot"></span>
              <span class="flag-label">DM2</span>
            </label>
            <label class="flag-item">
              <input type="checkbox" name="flag_icc"       value="1" /><span class="flag-dot"></span>
              <span class="flag-label">Insuf. Cardíaca</span>
            </label>
            <label class="flag-item">
              <input type="checkbox" name="flag_erc"       value="1" /><span class="flag-dot"></span>
              <span class="flag-label">Enf. Renal Crónica</span>
            </label>
            <label class="flag-item">
              <input type="checkbox" name="flag_epoc"      value="1" /><span class="flag-dot"></span>
              <span class="flag-label">EPOC</span>
            </label>
            <label class="flag-item">
              <input type="checkbox" name="flag_obesidad"  value="1" /><span class="flag-dot"></span>
              <span class="flag-label">Obesidad</span>
            </label>
            <label class="flag-item">
              <input type="checkbox" name="flag_acv"       value="1" /><span class="flag-dot"></span>
              <span class="flag-label">ACV previo</span>
            </label>
            <label class="flag-item">
              <input type="checkbox" name="flag_infarto"   value="1" /><span class="flag-dot"></span>
              <span class="flag-label">Infarto previo</span>
            </label>
            <label class="flag-item">
              <input type="checkbox" name="flag_dislipemia" value="1" /><span class="flag-dot"></span>
              <span class="flag-label">Dislipemia</span>
            </label>
            <label class="flag-item">
              <input type="checkbox" name="flag_ansiedad"  value="1" /><span class="flag-dot"></span>
              <span class="flag-label">Ansiedad</span>
            </label>
            <label class="flag-item">
              <input type="checkbox" name="flag_depresion" value="1" /><span class="flag-dot"></span>
              <span class="flag-label">Depresión</span>
            </label>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        Predecir destino clínico
      </button>

    </form>
  </div>

  <!-- ── Panel resultado ── -->
  <div class="result-panel">
    <div class="card">
      <div class="card-header">
        <span class="eyebrow">Resultado</span>
        <h2>Destino clínico predicho</h2>
      </div>
      <div class="card-body" id="resultBody">
        <div class="result-empty">
          <div class="icon">⬡</div>
          Completa el formulario y presiona <strong>Predecir</strong>
        </div>
      </div>
    </div>
  </div>

</div><!-- /container -->

<script>
// ── Fecha default = hoy ──────────────────────────────────────────
document.getElementById('fecha_atencion').value = new Date().toISOString().split('T')[0];

// ── Mostrar/ocultar días de hospitalización ──────────────────────
document.getElementById('flagHosp').addEventListener('change', function() {
  const field = document.querySelector('[name="dias_hosp"]');
  field.value = this.value === '0' ? '0' : field.value;
});

// ── Colores para barras de probabilidad ─────────────────────────
const COLOR_MAP = {
  'Caso_Critico':     '#ef4444',
  'Hospitalizacion':  '#f59e0b',
  'Emergencia':       '#f97316',
  'Consulta_Externa': '#22c55e',
  'Alta':             '#38bdf8',
};
function getColor(clase) {
  return COLOR_MAP[clase] || '#94a3b8';
}

// ── Render resultado ─────────────────────────────────────────────
function renderResult(data) {
  const colorClass = data.color;    // red | orange | green
  const fc = data.features_calculadas;

  // Ordenar probabilidades de mayor a menor
  const probs = Object.entries(data.probabilidades)
    .sort((a, b) => b[1] - a[1]);

  const probBars = probs.map(([clase, pct]) => `
    <div class="prob-item">
      <label>${clase.replace(/_/g,' ')}<span>${pct.toFixed(1)}%</span></label>
      <div class="prob-bar-bg">
        <div class="prob-bar-fill"
             style="width:${pct}%; background:${getColor(clase)}"></div>
      </div>
    </div>`).join('');

  document.getElementById('resultBody').innerHTML = `
    <div class="destino-badge ${colorClass}">
      <div class="destino-label">Destino predicho</div>
      <div class="destino-valor">${data.destino_predicho.replace(/_/g,' ')}</div>
      <div class="confianza">Confianza: ${data.confianza_pct}%</div>
    </div>

    <div class="section-divider" style="margin-bottom:12px">Distribución de probabilidad</div>
    <div class="prob-list" style="margin-bottom:20px">${probBars}</div>

    <div class="section-divider" style="margin-bottom:12px">Features calculadas</div>
    <div class="kv-grid">
      <div class="kv-item">
        <div class="kv-key">PP</div>
        <div class="kv-val">${fc.PP} mmHg</div>
      </div>
      <div class="kv-item">
        <div class="kv-key">PAM</div>
        <div class="kv-val">${fc.PAM} mmHg</div>
      </div>
      <div class="kv-item">
        <div class="kv-key">PA Controlada</div>
        <div class="kv-val">${fc.PA_controlada ? 'Sí' : 'No'}</div>
      </div>
      <div class="kv-item">
        <div class="kv-key">Grupo edad</div>
        <div class="kv-val">${fc.GRUPO_EDAD.replace(/_/g,' ')}</div>
      </div>
      <div class="kv-item" style="grid-column:span 2">
        <div class="kv-key">Índice complejidad</div>
        <div class="kv-val">${fc.IDX_complejidad}</div>
      </div>
    </div>
  `;
}

// ── Submit ───────────────────────────────────────────────────────
document.getElementById('htaForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const btn = document.getElementById('submitBtn');
  const resultBody = document.getElementById('resultBody');
  const apiUrl = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');

  btn.disabled = true;
  btn.textContent = 'Calculando...';
  resultBody.innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner"></div></div>';

  // Recopilar valores del formulario
  const fd = new FormData(this);
  const payload = {};

  // Flags: si no está marcado = 0
  ['flag_dm2','flag_icc','flag_erc','flag_epoc','flag_obesidad',
   'flag_acv','flag_infarto','flag_dislipemia','flag_ansiedad','flag_depresion']
    .forEach(f => payload[f] = 0);

  for (const [k, v] of fd.entries()) {
    const num = ['edad','pas','pad','nivel_eess','flag_hospitalizado',
                 'dias_hosp','n_diagnosticos','n_diag_definitivos',
                 'n_comorbilidades','fecate_post_fecfed',
                 'flag_dm2','flag_icc','flag_erc','flag_epoc','flag_obesidad',
                 'flag_acv','flag_infarto','flag_dislipemia','flag_ansiedad','flag_depresion'];
    payload[k] = num.includes(k) ? parseFloat(v) : v;
  }

  // Checkboxes marcados sobreescriben el 0 inicial
  this.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
    payload[cb.name] = 1;
  });

  try {
    const res = await fetch(`${apiUrl}/predecir`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: `HTTP ${res.status}` }));
      throw new Error(err.detail || `Error ${res.status}`);
    }

    const data = await res.json();
    renderResult(data);

  } catch (err) {
    resultBody.innerHTML = `
      <div class="error-box">
        <strong>Error al conectar con el backend</strong><br>
        ${err.message}<br><br>
        Verifica que la URL del backend sea correcta y que el servidor esté activo.
      </div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Predecir destino clínico';
  }
});
</script>
</body>
</html>
